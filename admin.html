<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>لوحة تحكم MCR7</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
<style>
:root { --bg-color: #0b0f19; --card-bg: #151f32; --text-color: #f8fafc; --accent-color: #00d26a; --border-color: #233148; --danger-color: #ef4444; }
* { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Tajawal', sans-serif; }
body { background-color: var(--bg-color); color: var(--text-color); min-height: 100vh; padding: 1.5rem 1rem; }
.admin-container { max-width: 800px; margin: 0 auto; background: var(--card-bg); padding: 2rem; border-radius: 16px; border: 1px solid var(--border-color); box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
h1 { color: var(--accent-color); font-size: 1.5rem; margin-bottom: 1.5rem; text-align: center; }
.channel-item { background: var(--bg-color); border: 1px solid var(--border-color); padding: 1rem; border-radius: 12px; margin-bottom: 1rem; }
label { display: block; font-size: 0.9rem; color: #94a3b8; margin-bottom: 5px; }
input { width: 100%; padding: 10px; border-radius: 8px; border: 1px solid var(--border-color); background: var(--card-bg); color: var(--text-color); margin-bottom: 10px; outline: none; }
.btn-group { display: flex; gap: 10px; margin-top: 1.5rem; }
button { flex: 1; padding: 12px; border-radius: 10px; border: none; font-weight: bold; cursor: pointer; font-size: 1rem; }
.save-btn { background: var(--accent-color); color: white; }
.add-btn { background: #3b82f6; color: white; }
.delete-btn { background: var(--danger-color); color: white; padding: 6px 12px; font-size: 0.85rem; border-radius: 6px; float: left; }
</style>
</head>
<body>
<div class="admin-container">
<h1>⚙️ لوحة تحكم القنوات - MCR7</h1>
<div id="channels-editor"></div>
<div class="btn-group">
<button class="add-btn" onclick="addChannel()">➕ إضافة قناة جديدة</button>
<button class="save-btn" onclick="saveAll()">💾 حفظ التغييرات</button>
</div>
</div>
<script>
let channels = JSON.parse(localStorage.getItem('app_channels')) || [
{ name: 'قناة 1', url: 'https://www.youtube.com/embed/live_stream?channel=YOUR_CHANNEL_ID' },
{ name: 'قناة 2', url: 'https://www.youtube.com/embed/live_stream?channel=YOUR_CHANNEL_ID' }
];

const container = document.getElementById('channels-editor');

function renderEditor() {
container.innerHTML = '';
channels.forEach((ch, index) => {
container.innerHTML += `
<div class="channel-item">
<button class="delete-btn" onclick="deleteChannel(${index})">حذف</button>
<label>اسم القناة:</label>
<input type="text" value="${ch.name}" onchange="channels[${index}].name = this.value">
<label>رابط البث (Embed URL / M3U8):</label>
<input type="text" value="${ch.url}" onchange="channels[${index}].url = this.value">
</div>
`;
});
}

function addChannel() {
channels.push({ name: 'قناة جديدة', url: '' });
renderEditor();
}

function deleteChannel(index) {
channels.splice(index, 1);
renderEditor();
}

function saveAll() {
localStorage.setItem('app_channels', JSON.stringify(channels));
alert('تم حفظ القنوات بنجاح! 🎉');
}

renderEditor();
</script>
</body>
</html>
