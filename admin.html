<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MCR7 - لوحة تحكم محمد جواد</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
<style>
:root { 
  --bg-dark: #020617; 
  --card-bg: rgba(15, 23, 42, 0.85); 
  --text-color: #f8fafc; 
  --neon-cyan: #00f0ff; 
  --neon-purple: #a855f7; 
  --border-glow: rgba(0, 240, 255, 0.3); 
}
* { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Tajawal', sans-serif; }
body { 
  background: radial-gradient(circle at 50% 10%, #1e1b4b 0%, var(--bg-dark) 100%); 
  color: var(--text-color); 
  min-height: 100vh; 
  padding: 1.5rem; 
}

/* شاشة تسجيل الدخول لوحة التحكم */
.login-screen { position: fixed; inset: 0; background: rgba(2, 6, 23, 0.95); backdrop-filter: blur(15px); display: flex; align-items: center; justify-content: center; z-index: 999; padding: 1rem; }
.login-box { background: var(--card-bg); padding: 2.5rem; border-radius: 24px; border: 1px solid var(--border-glow); text-align: center; max-width: 400px; width: 100%; box-shadow: 0 0 50px rgba(0, 240, 255, 0.15); backdrop-filter: blur(10px); }
.login-box h3 { color: var(--neon-cyan); margin-bottom: 1.5rem; font-size: 1.4rem; text-shadow: 0 0 10px rgba(0,240,255,0.5); }

.admin-container { max-width: 800px; margin: 0 auto; display: none; }
.header-box { text-align: center; margin-bottom: 2rem; }
.header-box h1 { font-size: 2rem; background: linear-gradient(45deg, var(--neon-cyan), var(--neon-purple)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; text-shadow: 0 0 20px rgba(0,240,255,0.4); margin-bottom: 0.5rem; }
.header-box p { color: var(--neon-cyan); font-weight: bold; font-size: 1.1rem; text-shadow: 0 0 10px rgba(0,240,255,0.3); }

.card { background: var(--card-bg); border: 1px solid var(--border-glow); border-radius: 20px; padding: 1.5rem; margin-bottom: 1.5rem; backdrop-filter: blur(10px); box-shadow: 0 0 30px rgba(0,240,255,0.1); }
.card h3 { color: var(--neon-cyan); margin-bottom: 1rem; font-size: 1.2rem; }

input { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid rgba(255,255,255,0.1); background: rgba(2, 6, 23, 0.8); color: #fff; margin-bottom: 1rem; outline: none; font-size: 1rem; transition: 0.3s; text-align: center; }
input:focus { border-color: var(--neon-cyan); box-shadow: 0 0 15px rgba(0, 240, 255, 0.3); }

.btn { width: 100%; padding: 12px; background: linear-gradient(135deg, var(--neon-cyan), var(--neon-purple)); color: #000; border: none; font-weight: 900; border-radius: 10px; cursor: pointer; font-size: 1rem; transition: 0.3s; box-shadow: 0 0 15px rgba(0,240,255,0.3); }
.btn:hover { transform: scale(1.02); }
.btn-danger { background: #ef4444; color: #fff; box-shadow: 0 0 15px rgba(239,68,68,0.4); }
.btn-edit { background: #3b82f6; color: #fff; box-shadow: 0 0 15px rgba(59,130,246,0.4); }

.actions-group { display: flex; gap: 8px; }
.item-row { background: rgba(2, 6, 23, 0.6); border: 1px solid rgba(255,255,255,0.05); padding: 10px 15px; border-radius: 10px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
.item-info { text-align: right; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 50%; }
</style>
</head>
<body>

<!-- شاشة حماية لوحة التحكم بالرمز admin8_2 -->
<div class="login-screen" id="adminLoginScreen">
  <div class="login-box">
    <h3>🛡️ بوابة التحكم السيبراني</h3>
    <p style="color: #94a3b8; font-size: 0.9rem; margin-bottom: 1rem;">الرمز: admin8_2</p>
    <input type="password" id="adminPassInput" placeholder="أدخل رمز لوحة التحكم">
    <button class="btn" onclick="checkAdminPass()">دخول للوحة</button>
  </div>
</div>

<div class="admin-container" id="adminPanel">
  <div class="header-box">
    <h1>⚡ MCR7 NEXUS ⚡</h1>
    <p>لوحة تحكم محمد جواد</p>
  </div>

  <!-- قسم تغيير رمز دخول موقع المشاهدين -->
  <div class="card">
    <h3>🔐 تغيير رمز الدخول السري لموقع المشاهدين</h3>
    <input type="password" id="newPass" placeholder="أدخل رمز موقع المشاهدين الجديد">
    <button class="btn" onclick="savePassword()">تحديث رمز الموقع</button>
  </div>

  <!-- قسم إضافة وتعديل القنوات -->
  <div class="card" id="channelCardSection">
    <h3 id="channelFormTitle">📺 إضافة قناة جديدة للبث</h3>
    <input type="hidden" id="editChannelIndex" value="-1">
    <input type="text" id="chName" style="text-align: right;" placeholder="اسم القناة (مثال: beIN Sports 1)">
    <input type="text" id="chUrl" style="text-align: right;" placeholder="رابط البث (.m3u8 أو رابط العبودي)">
    <button class="btn" id="channelBtnAction" onclick="saveChannel()">إضافة القناة للنظام</button>
    <button class="btn" id="cancelEditChannelBtn" onclick="cancelChannelEdit()" style="background: #64748b; color:#fff; margin-top: 8px; display:none;">إلغاء التعديل</button>
    <div id="channelsList" style="margin-top: 15px;"></div>
  </div>

  <!-- قسم جدول المباريات -->
  <div class="card">
    <h3>⚽ إضافة مباراة جديدة لجدول العرض</h3>
    <input type="text" id="team1" style="text-align: right;" placeholder="الفريق الأول (مثال: ريال مدريد)">
    <input type="text" id="team2" style="text-align: right;" placeholder="الفريق الثاني (مثال: برشلونة)">
    <input type="text" id="matchTime" style="text-align: right;" placeholder="التوقيت (مثال: اليوم 10:00 مساءً)">
    <button class="btn" onclick="addMatch()">إضافة المباراة للجدول</button>
    <div id="matchesList" style="margin-top: 15px;"></div>
  </div>
</div>

<script>
const ADMIN_SECRET = "admin8_2";

function checkAdminPass() {
  const entered = document.getElementById('adminPassInput').value;
  if(entered === ADMIN_SECRET) {
    document.getElementById('adminLoginScreen').style.display = 'none';
    document.getElementById('adminPanel').style.display = 'block';
    renderAll();
  } else {
    alert('رمز لوحة التحكم غير صحيح! (الرمز هو: admin8_2)');
  }
}

let channels = JSON.parse(localStorage.getItem('app_channels')) || [];
let matches = JSON.parse(localStorage.getItem('app_matches')) || [];

function renderAll() {
  const chContainer = document.getElementById('channelsList');
  chContainer.innerHTML = '';
  channels.forEach((ch, idx) => {
    chContainer.innerHTML += `
      <div class="item-row">
        <span class="item-info" title="${ch.name} - ${ch.url}"><b>${ch.name}</b></span>
        <div class="actions-group">
          <button class="btn btn-edit" style="padding:6px 10px; font-size:0.8rem;" onclick="startEditChannel(${idx})">تعديل</button>
          <button class="btn btn-danger" style="padding:6px 10px; font-size:0.8rem;" onclick="deleteChannel(${idx})">حذف</button>
        </div>
      </div>`;
  });

  const mContainer = document.getElementById('matchesList');
  mContainer.innerHTML = '';
  matches.forEach((m, idx) => {
    mContainer.innerHTML += `
      <div class="item-row">
        <span class="item-info">⚽ ${m.team1} VS ${m.team2} (${m.time})</span>
        <button class="btn btn-danger" style="padding:6px 10px; font-size:0.8rem;" onclick="deleteMatch(${idx})">حذف</button>
      </div>`;
  });
}

function savePassword() {
  const p = document.getElementById('newPass').value;
  if(!p) return alert('يرجى كتابة الرمز الجديد!');
  localStorage.setItem('mcr7_site_pass', p);
  alert('تم تغيير رمز موقع المشاهدين بنجاح!');
  document.getElementById('newPass').value = '';
}

function saveChannel() {
  const name = document.getElementById('chName').value;
  const url = document.getElementById('chUrl').value;
  const editIdx = parseInt(document.getElementById('editChannelIndex').value);

  if(!name || !url) return alert('يرجى ملء كافة الحقول!');

  if(editIdx === -1) {
    // إضافة جديدة
    channels.push({name, url});
    alert('تمت إضافة القناة بنجاح!');
  } else {
    // تعديل قناة موجودة
    channels[editIdx] = {name, url};
    alert('تم تحديث بيانات القناة بنجاح!');
    cancelChannelEdit();
  }

  localStorage.setItem('app_channels', JSON.stringify(channels));
  document.getElementById('chName').value = '';
  document.getElementById('chUrl').value = '';
  renderAll();
}

function startEditChannel(idx) {
  document.getElementById('editChannelIndex').value = idx;
  document.getElementById('chName').value = channels[idx].name;
  document.getElementById('chUrl').value = channels[idx].url;
  document.getElementById('channelFormTitle').textContent = '✏️ تعديل بيانات القناة';
  document.getElementById('channelBtnAction').textContent = 'حفظ التعديلات';
  document.getElementById('cancelEditChannelBtn').style.display = 'block';
  window.scrollTo({top: 200, behavior: 'smooth'});
}

function cancelChannelEdit() {
  document.getElementById('editChannelIndex').value = '-1';
  document.getElementById('chName').value = '';
  document.getElementById('chUrl').value = '';
  document.getElementById('channelFormTitle').textContent = '📺 إضافة قناة جديدة للبث';
  document.getElementById('channelBtnAction').textContent = 'إضافة القناة للنظام';
  document.getElementById('cancelEditChannelBtn').style.display = 'none';
}

function deleteChannel(idx) {
  channels.splice(idx, 1);
  localStorage.setItem('app_channels', JSON.stringify(channels));
  renderAll();
}

function addMatch() {
  const team1 = document.getElementById('team1').value;
  const team2 = document.getElementById('team2').value;
  const time = document.getElementById('matchTime').value;
  if(!team1 || !team2 || !time) return alert('يرجى إكمال تفاصيل المباراة!');
  matches.push({team1, team2, time});
  localStorage.setItem('app_matches', JSON.stringify(matches));
  document.getElementById('team1').value = '';
  document.getElementById('team2').value = '';
  document.getElementById('matchTime').value = '';
  renderAll();
  alert('تمت إضافة المباراة للجدول بنجاح!');
}

function deleteMatch(idx) {
  matches.splice(idx, 1);
  localStorage.setItem('app_matches', JSON.stringify(matches));
  renderAll();
}
</script>
</body>
</html>
