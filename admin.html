<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MCR7 - لوحة تحكم محمد جواد</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
<style>
:root { 
  --bg-deep: #030712;
  --card-bg: rgba(15, 23, 42, 0.75); 
  --text-color: #f8fafc; 
  --neon-cyan: #00f0ff; 
  --neon-purple: #c084fc; 
  --neon-pink: #f43f5e;
  --border-glow: rgba(0, 240, 255, 0.4); 
}

* { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Tajawal', sans-serif; }

body { 
  background: var(--bg-deep);
  background-image: 
    radial-gradient(circle at 10% 20%, rgba(168, 85, 247, 0.15) 0%, transparent 40%),
    radial-gradient(circle at 90% 80%, rgba(0, 240, 255, 0.15) 0%, transparent 40%);
  color: var(--text-color); 
  min-height: 100vh; 
  padding: 1.5rem; 
}

/* شاشة تسجيل الدخول بتصميم فضائي */
.login-screen { 
  position: fixed; inset: 0; 
  background: rgba(3, 7, 18, 0.92); 
  backdrop-filter: blur(20px); 
  display: flex; align-items: center; justify-content: center; 
  z-index: 999; padding: 1rem; 
}
.login-box { 
  background: var(--card-bg); 
  padding: 3rem 2rem; 
  border-radius: 28px; 
  border: 1px solid var(--border-glow); 
  text-align: center; 
  max-width: 420px; width: 100%; 
  box-shadow: 0 0 60px rgba(0, 240, 255, 0.2), inset 0 0 20px rgba(0, 240, 255, 0.05); 
  backdrop-filter: blur(15px); 
}
.login-box h3 { 
  color: var(--neon-cyan); 
  margin-bottom: 2rem; 
  font-size: 1.6rem; 
  font-weight: 900;
  text-shadow: 0 0 15px rgba(0,240,255,0.6); 
}

.admin-container { max-width: 850px; margin: 0 auto; display: none; }

.header-box { 
  text-align: center; 
  margin-bottom: 2.5rem; 
  padding: 1.5rem;
  background: var(--card-bg);
  border-radius: 24px;
  border: 1px solid var(--border-glow);
  box-shadow: 0 0 40px rgba(0,240,255,0.1);
}
.header-box h1 { 
  font-size: 2.3rem; 
  font-weight: 900;
  background: linear-gradient(135deg, var(--neon-cyan), var(--neon-purple)); 
  -webkit-background-clip: text; 
  -webkit-text-fill-color: transparent; 
  text-shadow: 0 0 25px rgba(0,240,255,0.4); 
  margin-bottom: 0.4rem; 
}
.header-box p { 
  color: var(--neon-cyan); 
  font-weight: 700; 
  font-size: 1.2rem; 
  letter-spacing: 1px;
  text-shadow: 0 0 10px rgba(0,240,255,0.4); 
}

.card { 
  background: var(--card-bg); 
  border: 1px solid var(--border-glow); 
  border-radius: 24px; 
  padding: 2rem; 
  margin-bottom: 1.8rem; 
  backdrop-filter: blur(12px); 
  box-shadow: 0 0 35px rgba(0, 240, 255, 0.08); 
  transition: 0.3s;
}
.card:hover {
  box-shadow: 0 0 45px rgba(0, 240, 255, 0.15);
  border-color: rgba(0, 240, 255, 0.6);
}
.card h3 { 
  color: var(--neon-cyan); 
  margin-bottom: 1.2rem; 
  font-size: 1.3rem; 
  font-weight: 700;
  display: flex;
  align-items: center;
  gap: 8px;
}

input { 
  width: 100%; 
  padding: 14px 16px; 
  border-radius: 12px; 
  border: 1px solid rgba(255, 255, 255, 0.1); 
  background: rgba(2, 6, 23, 0.85); 
  color: #fff; 
  margin-bottom: 1rem; 
  outline: none; 
  font-size: 1rem; 
  transition: 0.3s; 
  text-align: right; 
}
input:focus { 
  border-color: var(--neon-cyan); 
  box-shadow: 0 0 20px rgba(0, 240, 255, 0.35); 
}

.btn { 
  width: 100%; 
  padding: 13px; 
  background: linear-gradient(135deg, var(--neon-cyan), var(--neon-purple)); 
  color: #030712; 
  border: none; 
  font-weight: 900; 
  border-radius: 12px; 
  cursor: pointer; 
  font-size: 1.05rem; 
  transition: 0.3s; 
  box-shadow: 0 0 20px rgba(0,240,255,0.4); 
}
.btn:hover { 
  transform: translateY(-2px);
  box-shadow: 0 0 30px rgba(0,240,255,0.7); 
}

.btn-danger { background: linear-gradient(135deg, #f43f5e, #be123c); color: #fff; box-shadow: 0 0 15px rgba(244,63,94,0.4); }
.btn-danger:hover { box-shadow: 0 0 25px rgba(244,63,94,0.7); }

.btn-edit { background: linear-gradient(135deg, #3b82f6, #1d4ed8); color: #fff; box-shadow: 0 0 15px rgba(59,130,246,0.4); }
.btn-edit:hover { box-shadow: 0 0 25px rgba(59,130,246,0.7); }

.actions-group { display: flex; gap: 8px; }
.item-row { 
  background: rgba(2, 6, 23, 0.7); 
  border: 1px solid rgba(255, 255, 255, 0.07); 
  padding: 12px 18px; 
  border-radius: 12px; 
  display: flex; 
  justify-content: space-between; 
  align-items: center; 
  margin-bottom: 12px; 
  transition: 0.2s;
}
.item-row:hover { border-color: rgba(0,240,255,0.3); }
.item-info { text-align: right; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 55%; font-weight: bold; }
</style>
</head>
<body>

<!-- شاشة تسجيل الدخول بدون أي كتابة مزعجة -->
<div class="login-screen" id="adminLoginScreen">
  <div class="login-box">
    <h3>🛡️ بوابة التحكم السيبراني</h3>
    <input type="password" id="adminPassInput" placeholder="أدخل الرمز السري للوحة">
    <button class="btn" onclick="checkAdminPass()">دخول للنظام</button>
  </div>
</div>

<div class="admin-container" id="adminPanel">
  <div class="header-box">
    <h1>⚡ MCR7 NEXUS ⚡</h1>
    <p>لوحة تحكم محمد جواد</p>
  </div>

  <!-- قسم تغيير رمز دخول موقع المشاهدين -->
  <div class="card">
    <h3>🔐 رمز الدخول السري لموقع المشاهدين</h3>
    <input type="password" id="newPass" placeholder="أدخل رمز موقع المشاهدين الجديد">
    <button class="btn" onclick="savePassword()">تحديث رمز الموقع</button>
  </div>

  <!-- قسم إدارة القنوات -->
  <div class="card" id="channelCardSection">
    <h3 id="channelFormTitle">📺 إدارة القنوات وبث المباشر</h3>
    <input type="hidden" id="editChannelIndex" value="-1">
    <input type="text" id="chName" placeholder="اسم القناة (مثال: beIN Sports 1)">
    <input type="text" id="chUrl" placeholder="رابط البث (.m3u8 أو رابط العبودي)">
    <button class="btn" id="channelBtnAction" onclick="saveChannel()">إضافة القناة للنظام</button>
    <button class="btn" id="cancelEditChannelBtn" onclick="cancelChannelEdit()" style="background: #475569; color:#fff; margin-top: 8px; display:none; box-shadow:none;">إلغاء التعديل</button>
    <div id="channelsList" style="margin-top: 20px;"></div>
  </div>

  <!-- قسم جدول المباريات مع التعديل والحذف -->
  <div class="card" id="matchCardSection">
    <h3 id="matchFormTitle">⚽ جدول المباريات والعرض</h3>
    <input type="hidden" id="editMatchIndex" value="-1">
    <input type="text" id="team1" placeholder="الفريق الأول (مثال: ريال مدريد)">
    <input type="text" id="team2" placeholder="الفريق الثاني (مثال: برشلونة)">
    <input type="text" id="matchTime" placeholder="التوقيت (مثال: اليوم 10:00 مساءً)">
    <button class="btn" id="matchBtnAction" onclick="saveMatch()">إضافة المباراة للجدول</button>
    <button class="btn" id="cancelEditMatchBtn" onclick="cancelMatchEdit()" style="background: #475569; color:#fff; margin-top: 8px; display:none; box-shadow:none;">إلغاء التعديل</button>
    <div id="matchesList" style="margin-top: 20px;"></div>
  </div>
</div>

<script>
const ADMIN_SECRET = "admin8_2";

function checkAdminPass() {
  const entered = document.getElementById('adminPassInput').value;
  if(entered === ADMIN_SECRET) {
    document.getElementById('adminLoginScreen').style.display = 'none';
    document.getElementById('adminPanel').style.display = 'block';
    renderAll();
  } else {
    alert('رمز لوحة التحكم غير صحيح!');
  }
}

let channels = JSON.parse(localStorage.getItem('app_channels')) || [];
let matches = JSON.parse(localStorage.getItem('app_matches')) || [];

function renderAll() {
  const chContainer = document.getElementById('channelsList');
  chContainer.innerHTML = '';
  channels.forEach((ch, idx) => {
    chContainer.innerHTML += `
      <div class="item-row">
        <span class="item-info" title="${ch.name}">📺 ${ch.name}</span>
        <div class="actions-group">
          <button class="btn btn-edit" style="padding:6px 12px; font-size:0.85rem;" onclick="startEditChannel(${idx})">تعديل</button>
          <button class="btn btn-danger" style="padding:6px 12px; font-size:0.85rem;" onclick="deleteChannel(${idx})">حذف</button>
        </div>
      </div>`;
  });

  const mContainer = document.getElementById('matchesList');
  mContainer.innerHTML = '';
  matches.forEach((m, idx) => {
    mContainer.innerHTML += `
      <div class="item-row">
        <span class="item-info">⚽ ${m.team1} VS ${m.team2} (${m.time})</span>
        <div class="actions-group">
          <button class="btn btn-edit" style="padding:6px 12px; font-size:0.85rem;" onclick="startEditMatch(${idx})">تعديل</button>
          <button class="btn btn-danger" style="padding:6px 12px; font-size:0.85rem;" onclick="deleteMatch(${idx})">حذف</button>
        </div>
      </div>`;
  });
}

function savePassword() {
  const p = document.getElementById('newPass').value;
  if(!p) return alert('يرجى كتابة الرمز الجديد!');
  localStorage.setItem('mcr7_site_pass', p);
  alert('تم تغيير رمز موقع المشاهدين بنجاح!');
  document.getElementById('newPass').value = '';
}

// القنوات
function saveChannel() {
  const name = document.getElementById('chName').value;
  const url = document.getElementById('chUrl').value;
  const editIdx = parseInt(document.getElementById('editChannelIndex').value);

  if(!name || !url) return alert('يرجى ملء كافة حقول القناة!');

  if(editIdx === -1) {
    channels.push({name, url});
    alert('تمت إضافة القناة بنجاح!');
  } else {
    channels[editIdx] = {name, url};
    alert('تم تحديث بيانات القناة بنجاح!');
    cancelChannelEdit();
  }

  localStorage.setItem('app_channels', JSON.stringify(channels));
  document.getElementById('chName').value = '';
  document.getElementById('chUrl').value = '';
  renderAll();
}

function startEditChannel(idx) {
  document.getElementById('editChannelIndex').value = idx;
  document.getElementById('chName').value = channels[idx].name;
  document.getElementById('chUrl').value = channels[idx].url;
  document.getElementById('channelFormTitle').textContent = '✏️ تعديل بيانات القناة';
  document.getElementById('channelBtnAction').textContent = 'حفظ تعديل القناة';
  document.getElementById('cancelEditChannelBtn').style.display = 'block';
  window.scrollTo({top: 200, behavior: 'smooth'});
}

function cancelChannelEdit() {
  document.getElementById('editChannelIndex').value = '-1';
  document.getElementById('chName').value = '';
  document.getElementById('chUrl').value = '';
  document.getElementById('channelFormTitle').textContent = '📺 إدارة القنوات وبث المباشر';
  document.getElementById('channelBtnAction').textContent = 'إضافة القناة للنظام';
  document.getElementById('cancelEditChannelBtn').style.display = 'none';
}

function deleteChannel(idx) {
  channels.splice(idx, 1);
  localStorage.setItem('app_channels', JSON.stringify(channels));
  renderAll();
}

// المباريات
function saveMatch() {
  const team1 = document.getElementById('team1').value;
  const team2 = document.getElementById('team2').value;
  const time = document.getElementById('matchTime').value;
  const editIdx = parseInt(document.getElementById('editMatchIndex').value);

  if(!team1 || !team2 || !time) return alert('يرجى إكمال تفاصيل المباراة!');

  if(editIdx === -1) {
    matches.push({team1, team2, time});
    alert('تمت إضافة المباراة بنجاح!');
  } else {
    matches[editIdx] = {team1, team2, time};
    alert('تم تحديث تفاصيل المباراة بنجاح!');
    cancelMatchEdit();
  }

  localStorage.setItem('app_matches', JSON.stringify(matches));
  document.getElementById('team1').value = '';
  document.getElementById('team2').value = '';
  document.getElementById('matchTime').value = '';
  renderAll();
}

function startEditMatch(idx) {
  document.getElementById('editMatchIndex').value = idx;
  document.getElementById('team1').value = matches[idx].team1;
  document.getElementById('team2').value = matches[idx].team2;
  document.getElementById('matchTime').value = matches[idx].time;
  document.getElementById('matchFormTitle').textContent = '✏️ تعديل تفاصيل المباراة';
  document.getElementById('matchBtnAction').textContent = 'حفظ تعديل المباراة';
  document.getElementById('cancelEditMatchBtn').style.display = 'block';
  window.scrollTo({top: 500, behavior: 'smooth'});
}

function cancelMatchEdit() {
  document.getElementById('editMatchIndex').value = '-1';
  document.getElementById('team1').value = '';
  document.getElementById('team2').value = '';
  document.getElementById('matchTime').value = '';
  document.getElementById('matchFormTitle').textContent = '⚽ جدول المباريات والعرض';
  document.getElementById('matchBtnAction').textContent = 'إضافة المباراة للجدول';
  document.getElementById('cancelEditMatchBtn').style.display = 'none';
}

function deleteMatch(idx) {
  matches.splice(idx, 1);
  localStorage.setItem('app_matches', JSON.stringify(matches));
  renderAll();
}
</script>
</body>
</html>
