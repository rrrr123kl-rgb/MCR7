<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MCR7 LIVE - البث المباشر</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
<style>
:root { 
  --bg-color: #121212; 
  --card-bg: #1e1e1e; 
  --text-color: #ffffff; 
  --accent-color: #2e7d32; 
  --border-color: #333333; 
}
* { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Tajawal', sans-serif; }
body { background-color: var(--bg-color); color: var(--text-color); min-height: 100vh; }

.login-screen { position: fixed; inset: 0; background: var(--bg-color); display: flex; align-items: center; justify-content: center; z-index: 999; padding: 1rem; }
.login-box { background: var(--card-bg); padding: 2rem; border-radius: 8px; border: 1px solid var(--border-color); text-align: center; max-width: 380px; width: 100%; }
input { width: 100%; padding: 10px; border-radius: 6px; border: 1px solid var(--border-color); background: #2a2a2a; color: #fff; margin: 15px 0; text-align: center; outline: none; font-size: 1rem; }
.login-btn { width: 100%; padding: 10px; background: var(--accent-color); color: #fff; border: none; font-weight: bold; border-radius: 6px; cursor: pointer; font-size: 1rem; }

header { background: var(--card-bg); border-bottom: 1px solid var(--border-color); padding: 1rem 2rem; display: flex; justify-content: space-between; align-items: center; }
.logo { font-size: 1.3rem; font-weight: 700; color: #fff; }

main { max-width: 1000px; width: 100%; margin: 0 auto; padding: 1.5rem 1rem; display: none; }

.video-container { position: relative; width: 100%; height: 0; padding-bottom: 56.25%; background: #000; border-radius: 8px; overflow: hidden; border: 1px solid var(--border-color); margin-bottom: 1.5rem; }
.video-container video, .video-container iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }

h3 { color: #aaaaaa; font-weight: 400; font-size: 1.1rem; margin-bottom: 1rem; }
.channels-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 10px; }
.channel-btn { background: var(--card-bg); border: 1px solid var(--border-color); color: var(--text-color); padding: 12px; border-radius: 6px; font-weight: bold; cursor: pointer; text-align: center; transition: 0.2s; }
.channel-btn:hover { background: #2a2a2a; }
.channel-btn.active { background: var(--accent-color); border-color: var(--accent-color); }
</style>
</head>
<body>

<div class="login-screen" id="loginScreen">
  <div class="login-box">
    <h3>تسجيل الدخول</h3>
    <input type="password" id="sitePass" placeholder="رمز الدخول">
    <button class="login-btn" onclick="checkPass()">دخول</button>
  </div>
</div>

<header>
  <div class="logo">MCR7 LIVE</div>
</header>

<main id="mainContent">
  <div class="video-container" id="playerWrapper">
    <video id="videoPlayer" controls autoplay playsinline style="display:none;"></video>
  </div>
  
  <h3>اختر القناة:</h3>
  <div class="channels-grid" id="channelsList"></div>
</main>

<script>
const DEFAULT_PASS = "1234";
let hls = null;

function checkPass() {
  const entered = document.getElementById('sitePass').value;
  const savedPass = localStorage.getItem('mcr7_site_pass') || DEFAULT_PASS;
  if(entered === savedPass) {
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('mainContent').style.display = 'block';
    loadChannels();
  } else {
    alert('رمز الدخول غير صحيح!');
  }
}

async function loadChannels() {
  let channels = [];
  try {
    const res = await fetch('https://rrrr123kl-rgb.github.io/MCR7/channels.json?t=' + Date.now());
    if(res.ok) channels = await res.json();
  } catch(e) {}

  if(!channels || channels.length === 0) {
    channels = JSON.parse(localStorage.getItem('app_channels')) || [];
  }

  renderButtons(channels);
}

function renderButtons(channels) {
  const container = document.getElementById('channelsList');
  container.innerHTML = '';

  channels.forEach((ch, index) => {
    const btn = document.createElement('button');
    btn.className = 'channel-btn' + (index === 0 ? ' active' : '');
    btn.textContent = ch.name;
    btn.onclick = () => playStream(ch.url, btn);
    container.appendChild(btn);
  });

  if(channels.length > 0) playStream(channels[0].url, container.firstChild);
}

function playStream(url, btnElement) {
  if(btnElement) {
    document.querySelectorAll('.channel-btn').forEach(b => b.classList.remove('active'));
    btnElement.classList.add('active');
  }

  const wrapper = document.getElementById('playerWrapper');
  const video = document.getElementById('videoPlayer');

  // إيقاف وتفريغ تام للبث القديم لمنع أي تداخل
  video.pause();
  video.src = "";
  const oldIframe = wrapper.querySelector('iframe');
  if(oldIframe) {
    oldIframe.remove();
  }

  if (hls) {
    hls.destroy();
    hls = null;
  }

  // فحص نوع الرابط بدقة
  if (url.includes('.m3u8') || url.includes('.ts')) {
    video.style.display = 'block';
    if (Hls.isSupported()) {
      hls = new Hls();
      hls.loadSource(url);
      hls.attachMedia(video);
      hls.on(Hls.Events.MANIFEST_PARSED, function() {
        video.play().catch(e => console.log("Autoplay blocked"));
      });
    } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
      video.src = url;
      video.play().catch(e => console.log("Autoplay blocked"));
    }
  } else {
    // تشغيل روابط العبودي والصفحات عبر إطار محسن يدعم التشغيل التلقائي وملء الشاشة
    video.style.display = 'none';
    const iframe = document.createElement('iframe');
    iframe.src = url;
    iframe.setAttribute('allow', 'accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share');
    iframe.setAttribute('allowfullscreen', 'true');
    wrapper.appendChild(iframe);
  }
}
</script>
</body>
</html>
