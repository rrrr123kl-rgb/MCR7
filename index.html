<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>سبورت لايف - SPORT LIVE</title>
    <style>
        body {
            font-family: Tahoma, sans-serif;
            background-color: #121212;
            color: #ffffff;
            margin: 0;
            padding: 20px;
            text-align: center;
        }
        h1 {
            color: #00ffcc;
            margin-bottom: 30px;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            background: #1e1e1e;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }
        .section {
            margin-bottom: 25px;
        }
        h3 {
            border-bottom: 2px solid #00ffcc;
            padding-bottom: 5px;
            color: #ffcc00;
        }
        ul {
            list-style: none;
            padding: 0;
        }
        li {
            background: #2a2a2a;
            margin: 10px 0;
            padding: 12px;
            border-radius: 5px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        a.btn {
            background: #00ffcc;
            color: #121212;
            padding: 6px 14px;
            border-radius: 4px;
            text-decoration: none;
            font-weight: bold;
        }
        a.btn:hover {
            background: #00b386;
        }
    </style>
</head>
<body>

    <script>
        // التحقق من رمز الدخول الثابت
        let password = prompt("أدخل رمز الدخول للموقع:");
        if (password !== "2002") {
            alert("رمز الدخول غير صحيح!");
            document.body.innerHTML = "<h2 style='text-align:center; margin-top:100px; color:#ff4444;'>رمز الدخول غير صحيح! يرجى إعادة تحميل الصفحة والمحاولة مرة أخرى.</h2>";
            throw new Error("Unauthorized");
        }
    </script>

    <div class="container">
        <h1>SPORT LIVE - سبورت لايف</h1>

        <div class="section">
            <h3>المباريات الحالية</h3>
            <div id="matches-list">جاري تحميل المباريات...</div>
        </div>

        <div class="section">
            <h3>القنوات المباشرة</h3>
            <div id="channels-list">جاري تحميل القنوات...</div>
        </div>
    </div>

    <script>
        // جلب البيانات من ملفات الـ JSON تلقائياً
        fetch('matches.json')
            .then(res => res.json())
            .then(data => {
                let html = '<ul>';
                data.forEach(match => {
                    html += `<li><span>${match.name}</span> <a class="btn" href="${match.link}" target="_blank">مشاهدة</a></li>`;
                });
                html += '</ul>';
                document.getElementById('matches-list').innerHTML = html;
            })
            .catch(() => { document.getElementById('matches-list').innerHTML = "لا توجد مباريات مضافة حالياً."; });

        fetch('channels.json')
            .then(res => res.json())
            .then(data => {
                let html = '<ul>';
                data.forEach(channel => {
                    html += `<li><span>${channel.name}</span> <a class="btn" href="${channel.link}" target="_blank">فتح القناة</a></li>`;
                });
                html += '</ul>';
                document.getElementById('channels-list').innerHTML = html;
            })
            .catch(() => { document.getElementById('channels-list').innerHTML = "لا توجد قنوات مضافة حالياً."; });
    </script>

</body>
</html>
