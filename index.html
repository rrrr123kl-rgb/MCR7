<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MCR7 - البث المباشر</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
<style>
:root { --bg-color: #030712; --card-bg: #0f172a; --text-color: #f8fafc; --accent-color: #00ffcc; --border-color: #1e293b; }
* { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Tajawal', sans-serif; }
body { background: radial-gradient(circle at center, #0f172a 0%, #030712 100%); color: var(--text-color); min-height: 100vh; overflow-x: hidden; }

.login-screen { position: fixed; inset: 0; background: rgba(3, 7, 18, 0.95); backdrop-filter: blur(10px); display: flex; align-items: center; justify-content: center; z-index: 999; padding: 1rem; }
.login-box { background: rgba(15, 23, 42, 0.8); padding: 2.5rem; border-radius: 20px; border: 1px solid rgba(0, 255, 204, 0.3); text-align: center; max-width: 400px; width: 100%; box-shadow: 0 0 30px rgba(0, 255, 204, 0.15); }
input { width: 100%; padding: 14px; border-radius: 12px; border: 1px solid var(--border-color); background: rgba(3, 7, 18, 0.8); color: #fff; margin: 15px 0; text-align: center; outline: none; font-size: 1rem; transition: 0.3s; }
input:focus { border-color: var(--accent-color); box-shadow: 0 0 15px rgba(0, 255, 204, 0.4); }
.login-btn { width: 100%; padding: 14px; background: linear-gradient(135deg, #00ffcc, #0077ff); color: #000; border: none; font-weight: 900; border-radius: 12px; cursor: pointer; font-size: 1.1rem; box-shadow: 0 0 20px rgba(0, 255, 204, 0.4); transition: 0.3s; }

header { background: rgba(15, 23, 42, 0.9); border-bottom: 1px solid var(--border-color); padding: 1.2rem 2rem; display: flex; justify-content: space-between; align-items: center; backdrop-filter: blur(10px); }
.logo { font-size: 1.8rem; font-weight: 900; background: linear-gradient(45deg, #00ffcc, #ff0077, #7928ca, #00ffcc); background-size: 300% 300%; -webkit-background-clip: text; -webkit-text-fill-color: transparent; animation: neonGlow 6s ease infinite; text-shadow: 0 0 20px rgba(0,255,204,0.3); }

@keyframes neonGlow {
  0% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}

main { max-width: 1200px; width: 100%; margin: 0 auto; padding: 2rem 1rem; display: none; }
.video-container { position: relative; width: 100%; height: 0; padding-bottom: 56.25%; background: #000; border-radius: 20px; overflow: hidden; border: 2px solid rgba(0, 255, 204, 0.3); box-shadow: 0 0 40px rgba(0, 255, 204, 0.15); margin-bottom: 2rem; }
.video-container video, .video-container iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }

h3 { color: #94a3b8; font-weight: 700; margin-bottom: 1rem; letter-spacing: 1px; }
.channels-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 1rem; }
.channel-btn { background: rgba(15, 23, 42, 0.8); border: 1px solid var(--border-color); color: var(--text-color); padding: 1.2rem; border-radius: 14px; font-weight: bold; cursor: pointer; text-align: center; transition: 0.3s; }
.channel-btn:hover { border-color: var(--accent-color); transform: translateY(-3px); }
.channel-btn.active { background: linear-gradient(135deg, #00ffcc, #0077ff); color: #000; border-color: transparent; box-shadow: 0 0 25px rgba(0, 255, 204, 0.5); }
</style>
</head>
<body>

<div class="login-screen" id="loginScreen">
  <div class="login-box">
    <h2 style="color: #00ffcc; margin-bottom: 1rem;">🌌 MCR7 NEXUS</h2>
    <input type="password" id="sitePass" placeholder="أدخل رمز الدخول السري">
    <button class="login-btn" onclick="checkPass()">اتصال بالشبكة</button>
  </div>
</div>

<header>
  <div class="logo">⚽ MCR7 LIVE 🚀</div>
</header>

<main id="mainContent">
  <div class="video-container" id="playerWrapper">
    <video id="videoPlayer" controls autoplay playsinline style="display:none;"></video>
  </div>
  
  <h3>📺 القنوات والسيرفرات النشطة:</h3>
  <div class="channels-grid" id="channelsList"></div>
</main>

<script>
const DEFAULT_PASS = "1234";
let hls = null;

function checkPass() {
  const entered = document.getElementById('sitePass').value;
  const savedPass = localStorage.getItem('mcr7_site_pass') || DEFAULT_PASS;
  if(entered === savedPass) {
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('mainContent').style.display = 'block';
    loadChannels();
  } else {
    alert('رمز الدخول غير صحيح!');
  }
}

async function loadChannels() {
  let channels = [];
  try {
    const res = await fetch('https://rrrr123kl-rgb.github.io/MCR7/channels.json?t=' + Date.now());
    if(res.ok) channels = await res.json();
  } catch(e) {}

  if(!channels || channels.length === 0) {
    channels = JSON.parse(localStorage.getItem('app_channels')) || [];
  }

  renderButtons(channels);
}

function renderButtons(channels) {
  const container = document.getElementById('channelsList');
  container.innerHTML = '';

  channels.channelsObject = channels;
  channels.forEach((ch, index) => {
    const btn = document.createElement('button');
    btn.className = 'channel-btn' + (index === 0 ? ' active' : '');
    btn.textContent = ch.name;
    btn.onclick = () => playStream(ch.url, btn);
    container.appendChild(btn);
  });

  if(channels.length > 0) playStream(channels[0].url, container.firstChild);
}

function playStream(url, btnElement) {
  if(btnElement) {
    document.querySelectorAll('.channel-btn').forEach(b => b.classList.remove('active'));
    btnElement.classList.add('active');
  }

  const wrapper = document.getElementById('playerWrapper');
  const video = document.getElementById('videoPlayer');

  // --- منع التداخل: تفريغ وإيقاف تام لأي بث سابق فوراً بدون رفرش ---
  video.pause();
  video.src = "";
  const oldIframe = wrapper.querySelector('iframe');
  if(oldIframe) {
    oldIframe.remove();
  }

  if (hls) {
    hls.destroy();
    hls = null;
  }
  // -------------------------------------------------------------

  if (url.includes('.m3u8') || url.includes('.ts')) {
    video.style.display = 'block';
    if (Hls.isSupported()) {
      hls = new Hls();
      hls.loadSource(url);
      hls.attachMedia(video);
      hls.on(Hls.Events.MANIFEST_PARSED, function() {
        video.play().catch(e => console.log("Autoplay blocked"));
      });
    } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
      video.src = url;
      video.play().catch(e => console.log("Autoplay blocked"));
    }
  } else {
    video.style.display = 'none';
    const iframe = document.createElement('iframe');
    iframe.src = url;
    iframe.allow = "autoplay; fullscreen; encrypted-media";
    wrapper.appendChild(iframe);
  }
}
</script>
</body>
</html>
