<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MCR7 - SPORT LIVE | محمد جواد</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #05050a;
            --card-bg: rgba(18, 18, 35, 0.7);
            --text-color: #ffffff;
            --neon-cyan: #00f3ff;
            --neon-pink: #ff0055;
            --neon-green: #00ff66;
            --border-glow: 0 0 15px rgba(0, 243, 255, 0.4);
        }
        
        [data-theme="light"] {
            --bg-color: #f0f2f5;
            --card-bg: rgba(255, 255, 255, 0.85);
            --text-color: #1a1a1a;
            --neon-cyan: #0077ff;
            --neon-pink: #d90036;
            --neon-green: #008f39;
            --border-glow: 0 0 15px rgba(0, 119, 255, 0.3);
        }

        body {
            font-family: 'Cairo', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            transition: all 0.4s ease;
            overflow-x: hidden;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        /* رأس الصفحة بتصميم نيون فخم */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            border: 2px solid var(--neon-cyan);
            box-shadow: var(--border-glow);
            padding: 20px;
            border-radius: 16px;
            margin-bottom: 30px;
        }

        h1 {
            margin: 0;
            font-size: 26px;
            font-weight: 900;
            color: var(--neon-cyan);
            text-shadow: 0 0 10px var(--neon-cyan), 0 0 20px var(--neon-cyan);
            letter-spacing: 1px;
        }

        .dev-tag {
            font-size: 13px;
            color: var(--neon-pink);
            text-shadow: 0 0 8px var(--neon-pink);
            font-weight: bold;
            margin-top: 4px;
        }

        .theme-btn {
            background: transparent;
            color: var(--text-color);
            border: 2px solid var(--neon-pink);
            box-shadow: 0 0 10px rgba(255, 0, 85, 0.3);
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }

        .theme-btn:hover {
            background: var(--neon-pink);
            color: #fff;
            box-shadow: 0 0 20px var(--neon-pink);
        }

        h2 {
            color: var(--neon-cyan);
            border-bottom: 2px dashed var(--neon-cyan);
            padding-bottom: 8px;
            margin-top: 40px;
            text-shadow: 0 0 8px rgba(0, 243, 255, 0.5);
        }

        /* البطاقات بنظام الزجاج والنيون */
        .card {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 18px;
            margin: 15px 0;
            border-radius: 14px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            display: flex;
            flex-direction: column;
            gap: 12px;
            transition: transform 0.3s, border-color 0.3s;
        }

        .card:hover {
            border-color: var(--neon-cyan);
            box-shadow: var(--border-glow);
            transform: translateY(-3px);
        }

        .card-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .controls {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .btn {
            background: linear-gradient(135deg, var(--neon-green), #00aa44);
            color: #000;
            padding: 8px 16px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: bold;
            font-size: 14px;
            border: none;
            cursor: pointer;
            box-shadow: 0 0 10px rgba(0, 255, 102, 0.4);
            transition: 0.3s;
        }

        .btn:hover {
            box-shadow: 0 0 20px var(--neon-green);
            transform: scale(1.05);
        }

        .btn-external {
            background: linear-gradient(135deg, #7c3aed, #4f46e5);
            color: #fff;
            box-shadow: 0 0 10px rgba(124, 58, 237, 0.4);
        }
        .btn-external:hover {
            box-shadow: 0 0 20px #7c3aed;
        }

        /* مشغل الفيديو الداخلي الفخم */
        #player-container {
            display: none;
            border: 2px solid var(--neon-cyan);
            box-shadow: 0 0 30px rgba(0, 243, 255, 0.5);
            margin-top: 30px;
        }

        video {
            width: 100%;
            max-height: 450px;
            background: #000;
            border-radius: 8px;
            margin-top: 10px;
        }

        .close-btn {
            background: linear-gradient(135deg, var(--neon-pink), #cc0044);
            color: white;
            width: 100%;
            margin-top: 10px;
            box-shadow: 0 0 10px rgba(255, 0, 85, 0.4);
        }
        .close-btn:hover {
            box-shadow: 0 0 20px var(--neon-pink);
        }
    </style>
    <!-- مكتبة تشغيل الـ m3u8 -->
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
</head>
<body data-theme="dark">

    <script>
        // التحقق الأمني بالرمز الثابت
        let pwd = prompt("🔒 أدخل رمز الدخول للموقع:");
        if (pwd !== "2002") {
            alert("❌ رمز الدخول غير صحيح!");
            document.body.innerHTML = "<h2 style='text-align:center; margin-top:200px; color:#ff0055; text-shadow:0 0 15px #ff0055;'>رمز الدخول غير صحيح! يرجى إعادة التحميل.</h2>";
            throw new Error("Access Denied");
        }
    </script>

    <div class="container">
        <div class="header">
            <div>
                <h1>⚡ SPORT LIVE ⚡</h1>
                <div class="dev-tag">إشراف وتطوير: محمد جواد</div>
            </div>
            <button class="theme-btn" onclick="toggleTheme()">🌓 وضع الإضاءة</button>
        </div>
        
        <h2>⚽ المباريات الحالية</h2>
        <div id="matches">جاري استدعاء المباريات من السيفر...</div>

        <h2>📺 القنوات المباشرة</h2>
        <div id="channels">جاري استدعاء القنوات من السيفر...</div>

        <!-- مشغل البث الداخلي المتطور -->
        <div class="card" id="player-container">
            <h3 id="player-title" style="margin:0; color:var(--neon-cyan);">مشغل البث المباشر</h3>
            <video id="video-player" controls autoplay></video>
            <button class="btn close-btn" onclick="closePlayer()">إغلاق المشغل ✕</button>
        </div>
    </div>

    <script>
        // تبديل الوضع الليلي والنهاري بنين
        function toggleTheme() {
            const body = document.body;
            if (body.getAttribute("data-theme") === "dark") {
                body.setAttribute("data-theme", "light");
            } else {
                body.setAttribute("data-theme", "dark");
            }
        }

        // تشغيل البث (دعم m3u8 والروابط)
        function playStream(url, title) {
            const container = document.getElementById('player-container');
            const video = document.getElementById('video-player');
            const titleElem = document.getElementById('player-title');
            
            container.style.display = 'flex';
            titleElem.innerText = "📺 " + title;
            window.scrollTo({top: document.body.scrollHeight, behavior: 'smooth'});

            if (url.includes('.m3u8')) {
                if (Hls.isSupported()) {
                    const hls = new Hls();
                    hls.loadSource(url);
                    hls.attachMedia(video);
                    hls.on(Hls.Events.MANIFEST_PARSED, function() {
                        video.play();
                    });
                } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                    video.src = url;
                    video.addEventListener('loadedmetadata', function() {
                        video.play();
                    });
                }
            } else {
                window.open(url, '_blank');
            }
        }

        function closePlayer() {
            const video = document.getElementById('video-player');
            const container = document.getElementById('player-container');
            video.pause();
            video.src = "";
            container.style.display = 'none';
        }

        // جلب المباريات
        fetch('matches.json')
            .then(res => res.json())
            .then(data => {
                let output = '';
                if(!data || data.length === 0) { output = '<p style="text-align:center;">لا توجد مباريات مضافة حالياً</p>'; }
                else {
                    data.forEach(item => {
                        let link = item.link || item.url || '#';
                        let title = item.name || item.title || 'مباراة';
                        output += `
                            <div class="card">
                                <div class="card-row">
                                    <span><strong>🔥 ${title}</strong></span>
                                    <div class="controls">
                                        <button class="btn" onclick="playStream('${link}', '${title}')">مشاهدة داخلية</button>
                                        <a class="btn btn-external" href="${link}" target="_blank">رابط خارجي</a>
                                    </div>
                                </div>
                            </div>
                        `;
                    });
                }
                document.getElementById('matches').innerHTML = output;
            }).catch(() => { document.getElementById('matches').innerHTML = '<p style="text-align:center;">خطأ في تحميل المباريات</p>'; });

        // جلب القنوات
        fetch('channels.json')
            .then(res => res.json())
            .then(data => {
                let output = '';
                if(!data || data.length === 0) { output = '<p style="text-align:center;">لا توجد قنوات مضافة حالياً</p>'; }
                else {
                    data.forEach(item => {
                        let link = item.link || item.url || '#';
                        let title = item.name || item.title || 'قناة';
                        output += `
                            <div class="card">
                                <div class="card-row">
                                    <span><strong>📡 ${title}</strong></span>
                                    <div class="controls">
                                        <button class="btn" onclick="playStream('${link}', '${title}')">تشغيل القناة</button>
                                        <a class="btn btn-external" href="${link}" target="_blank">فتح خارجي</a>
                                    </div>
                                </div>
                            </div>
                        `;
                    });
                }
                document.getElementById('channels').innerHTML = output;
            }).catch(() => { document.getElementById('channels').innerHTML = '<p style="text-align:center;">خطأ في تحميل القنوات</p>'; });
    </script>

</body>
</html>
