<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SPORT LIVE - لوحة العرض</title>
    <style>
        body {
            font-family: 'Cairo', Tahoma, sans-serif;
            background: #0f172a;
            color: #f8fafc;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
        }
        h1, h2 {
            text-align: center;
            color: #38bdf8;
        }
        .card {
            background: #1e293b;
            padding: 15px;
            margin: 15px 0;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .btn {
            background: #22c55e;
            color: white;
            padding: 8px 16px;
            border-radius: 6px;
            text-decoration: none;
            font-weight: bold;
        }
        .btn:hover {
            background: #16a34a;
        }
    </style>
</head>
<body>

    <script>
        // التحقق من الرمز الثابت
        let pwd = prompt("أدخل رمز الدخول للموقع:");
        if (pwd !== "2002") {
            alert("رمز الدخول غير صحيح!");
            document.body.innerHTML = "<h2 style='text-align:center; margin-top:150px; color:#ef4444;'>رمز الدخول غير صحيح! يرجى إعادة التحميل.</h2>";
            throw new Error("Access Denied");
        }
    </script>

    <div class="container">
        <h1>SPORT LIVE</h1>
        
        <h2>المباريات</h2>
        <div id="matches">جاري تحميل المباريات...</div>

        <h2>القنوات</h2>
        <div id="channels">جاري تحميل القنوات...</div>
    </div>

    <script>
        // جلب البيانات من ملفات JSON المتوافقة مع تصميمك القديم
        fetch('matches.json')
            .then(res => res.json())
            .then(data => {
                let output = '';
                if(data.length === 0) { output = '<p style="text-align:center;">لا توجد مباريات حالياً</p>'; }
                data.forEach(item => {
                    output += `
                        <div class="card">
                            <span><strong>${item.name || item.title || 'مباراة'}</strong></span>
                            <a class="btn" href="${item.link}" target="_blank">مشاهدة</a>
                        </div>
                    `;
                });
                document.getElementById('matches').innerHTML = output;
            }).catch(() => { document.getElementById('matches').innerHTML = '<p style="text-align:center;">خطأ في تحميل المباريات</p>'; });

        fetch('channels.json')
            .then(res => res.json())
            .then(data => {
                let output = '';
                if(data.length === 0) { output = '<p style="text-align:center;">لا توجد قنوات حالياً</p>'; }
                data.forEach(item => {
                    output += `
                        <div class="card">
                            <span><strong>${item.name || item.title || 'قناة'}</strong></span>
                            <a class="btn" href="${item.link}" target="_blank">فتح القناة</a>
                        </div>
                    `;
                });
                document.getElementById('channels').innerHTML = output;
            }).catch(() => { document.getElementById('channels').innerHTML = '<p style="text-align:center;">خطأ في تحميل القنوات</p>'; });
    </script>

</body>
</html>
