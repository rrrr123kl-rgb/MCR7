<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MCR7 - البث المباشر</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
<style>
:root { --bg-color: #0b0f19; --card-bg: #151f32; --text-color: #f8fafc; --accent-color: #00d26a; --border-color: #233148; }
* { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Tajawal', sans-serif; }
body { background-color: var(--bg-color); color: var(--text-color); min-height: 100vh; }
.login-screen { position: fixed; inset: 0; background: var(--bg-color); display: flex; align-items: center; justify-content: center; z-index: 999; padding: 1rem; }
.login-box { background: var(--card-bg); padding: 2rem; border-radius: 16px; border: 1px solid var(--border-color); text-align: center; max-width: 400px; width: 100%; }
input { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid var(--border-color); background: var(--bg-color); color: #fff; margin: 15px 0; text-align: center; outline: none; font-size: 1rem; }
button { width: 100%; padding: 12px; background: var(--accent-color); color: #000; border: none; font-weight: bold; border-radius: 8px; cursor: pointer; font-size: 1rem; }
header { background: var(--card-bg); border-bottom: 1px solid var(--border-color); padding: 1rem 2rem; display: flex; justify-content: space-between; align-items: center; }
.logo { font-size: 1.5rem; font-weight: 900; color: var(--accent-color); }
main { max-width: 1200px; width: 100%; margin: 0 auto; padding: 1.5rem 1rem; display: none; }
.video-container { position: relative; width: 100%; height: 0; padding-bottom: 56.25%; background: #000; border-radius: 16px; overflow: hidden; border: 1px solid var(--border-color); margin-bottom: 1.5rem; }
.video-container video { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
.channels-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 1rem; }
.channel-btn { background: var(--card-bg); border: 1px solid var(--border-color); color: var(--text-color); padding: 1rem; border-radius: 12px; font-weight: bold; cursor: pointer; text-align: center; }
.channel-btn.active { background: var(--accent-color); color: #000; }
</style>
</head>
<body>
<div class="login-screen" id="loginScreen">
  <div class="login-box">
    <h2>🔒 MCR7 LIVE</h2>
    <input type="password" id="sitePass" placeholder="رمز الدخول">
    <button onclick="checkPass()">دخول</button>
  </div>
</div>
<header>
  <div class="logo">⚽ MCR7 LIVE</div>
</header>
<main id="mainContent">
  <div class="video-container">
    <video id="videoPlayer" controls autoplay playsinline></video>
  </div>
  <h3 style="margin-bottom: 1rem; color: #94a3b8;">📺 اختيار السيرفر / القناة:</h3>
  <div class="channels-grid" id="channelsList"></div>
</main>
<script>
const DEFAULT_PASS = "1234";
let hls = null;
function checkPass() {
  const entered = document.getElementById('sitePass').value;
  const savedPass = localStorage.getItem('mcr7_site_pass') || DEFAULT_PASS;
  if(entered === savedPass) {
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('mainContent').style.display = 'block';
    loadChannels();
  } else {
    alert('رمز الدخول غير صحيح!');
  }
}
async function loadChannels() {
  let channels = [];
  try {
    const res = await fetch('https://rrrr123kl-rgb.github.io/MCR7/channels.json?t=' + Date.now());
    if(res.ok) channels = await res.json();
  } catch(e) {}
  if(!channels || channels.length === 0) {
    channels = JSON.parse(localStorage.getItem('app_channels')) || [];
  }
  renderButtons(channels);
}
function renderButtons(channels) {
  const container = document.getElementById('channelsList');
  container.innerHTML = '';
  channels.forEach((ch, index) => {
    const btn = document.createElement('button');
    btn.className = 'channel-btn' + (index === 0 ? ' active' : '');
    btn.textContent = ch.name;
    btn.onclick = () => playStream(ch.url, btn);
    container.appendChild(btn);
  });
  if(channels.length > 0) playStream(channels[0].url, container.firstChild);
}
function playStream(url, btnElement) {
  if(btnElement) {
    document.querySelectorAll('.channel-btn').forEach(b => b.classList.remove('active'));
    btnElement.classList.add('active');
  }
  const video = document.getElementById('videoPlayer');
  if (hls) {
    hls.destroy();
    hls = null;
  }
  if (Hls.isSupported()) {
    hls = new Hls();
    hls.loadSource(url);
    hls.attachMedia(video);
    hls.on(Hls.Events.MANIFEST_PARSED, function() {
      video.play().catch(e => console.log("Autoplay blocked"));
    });
  } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
    video.src = url;
    video.play().catch(e => console.log("Autoplay blocked"));
  }
}
</script>
</body>
</html>
