<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MCR7 - البث المباشر</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
<style>
:root { --bg-color: #0b0f19; --card-bg: #151f32; --text-color: #f8fafc; --accent-color: #00d26a; --border-color: #233148; }
* { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Tajawal', sans-serif; }
body { background-color: var(--bg-color); color: var(--text-color); min-height: 100vh; display: flex; flex-direction: column; }
header { background: var(--card-bg); border-bottom: 1px solid var(--border-color); padding: 1rem 2rem; display: flex; justify-content: space-between; align-items: center; }
.logo { font-size: 1.5rem; font-weight: 900; color: var(--accent-color); }
main { flex: 1; max-width: 1200px; width: 100%; margin: 0 auto; padding: 1.5rem 1rem; }
.video-container { position: relative; padding-bottom: 56.25%; height: 0; background: #000; border-radius: 16px; overflow: hidden; border: 1px solid var(--border-color); box-shadow: 0 10px 30px rgba(0,0,0,0.5); margin-bottom: 1.5rem; }
.video-container iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: 0; }
.channels-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 1rem; }
.channel-btn { background: var(--card-bg); border: 1px solid var(--border-color); color: var(--text-color); padding: 1rem; border-radius: 12px; font-weight: bold; cursor: pointer; text-align: center; transition: all 0.2s ease; }
.channel-btn:hover, .channel-btn.active { background: var(--accent-color); color: #000; border-color: var(--accent-color); }
</style>
</head>
<body>
<header>
<div class="logo">⚽ MCR7 LIVE</div>
</header>
<main>
<div class="video-container">
<iframe id="main-player" src="" allowfullscreen></iframe>
</div>
<div class="channels-grid" id="channels-list"></div>
</main>
<script>
const defaultChannels = [
{ name: 'قناة 1', url: 'https://www.youtube.com/embed/live_stream?channel=YOUR_CHANNEL_ID' },
{ name: 'قناة 2', url: 'https://www.youtube.com/embed/live_stream?channel=YOUR_CHANNEL_ID' }
];

const channels = JSON.parse(localStorage.getItem('app_channels')) || defaultChannels;
const player = document.getElementById('main-player');
const listContainer = document.getElementById('channels-list');

function loadChannel(url, btn) {
player.src = url;
document.querySelectorAll('.channel-btn').forEach(b => b.classList.remove('active'));
if(btn) btn.classList.add('active');
}

channels.forEach((ch, index) => {
const btn = document.createElement('button');
btn.className = 'channel-btn' + (index === 0 ? ' active' : '');
btn.textContent = ch.name;
btn.onclick = () => loadChannel(ch.url, btn);
listContainer.appendChild(btn);
});

if(channels.length > 0) loadChannel(channels[0].url);
</script>
</body>
</html>
