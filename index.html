<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MCR7 - ULTRA SPORT | إشراف: محمد جواد</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #030712;
            --surface: rgba(15, 23, 42, 0.75);
            --border: rgba(56, 189, 248, 0.2);
            --neon-blue: #00f0ff;
            --neon-pink: #ff0055;
            --neon-green: #10b981;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
        }

        [data-theme="light"] {
            --bg: #f8fafc;
            --surface: rgba(255, 255, 255, 0.85);
            --border: rgba(0, 119, 255, 0.2);
            --neon-blue: #0284c7;
            --neon-pink: #e11d48;
            --neon-green: #059669;
            --text-main: #0f172a;
            --text-muted: #64748b;
        }

        * {
            box-sizing: border-box;
            transition: background 0.3s, color 0.3s, border 0.3s;
        }

        body {
            font-family: 'Tajawal', sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            min-height: 100vh;
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(0, 240, 255, 0.05) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(255, 0, 85, 0.05) 0%, transparent 40%);
        }

        .container {
            max-width: 950px;
            margin: 0 auto;
        }

        .hero-header {
            background: var(--surface);
            backdrop-filter: blur(16px);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            margin-bottom: 35px;
            position: relative;
            overflow: hidden;
        }

        .hero-header::after {
            content: '';
            position: absolute;
            top: 0; right: 0; width: 4px; height: 100%;
            background: linear-gradient(to bottom, var(--neon-blue), var(--neon-pink));
        }

        .logo-area h1 {
            margin: 0;
            font-size: 28px;
            font-weight: 900;
            letter-spacing: 1px;
            background: linear-gradient(135deg, var(--neon-blue), var(--text-main));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .developer-tag {
            font-size: 13px;
            color: var(--neon-pink);
            font-weight: 700;
            margin-top: 5px;
            text-shadow: 0 0 10px rgba(255, 0, 85, 0.3);
        }

        .theme-toggle {
            background: transparent;
            border: 2px solid var(--border);
            color: var(--text-main);
            padding: 8px 16px;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 700;
            font-family: 'Tajawal', sans-serif;
        }
        .theme-toggle:hover {
            border-color: var(--neon-blue);
            box-shadow: 0 0 15px rgba(0, 240, 255, 0.2);
        }

        .section-title {
            font-size: 20px;
            font-weight: 800;
            color: var(--neon-blue);
            margin: 35px 0 20px 0;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .section-title::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border);
        }

        .grid-cards {
            display: grid;
            grid-template-columns: 1fr;
            gap: 15px;
        }

        .match-card {
            background: var(--surface);
            backdrop-filter: blur(12px);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.15);
            position: relative;
            overflow: hidden;
        }

        .match-card:hover {
            border-color: var(--neon-blue);
            box-shadow: 0 8px 30px rgba(0, 240, 255, 0.15);
            transform: translateY(-2px);
        }

        .match-info {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .live-pulse {
            width: 12px;
            height: 12px;
            background-color: var(--neon-pink);
            border-radius: 50%;
            box-shadow: 0 0 0 0 rgba(255, 0, 85, 0.7);
            animation: pulse 1.6s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(255, 0, 85, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 10px rgba(255, 0, 85, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(255, 0, 85, 0); }
        }

        .match-title {
            font-size: 17px;
            font-weight: 700;
            color: var(--text-main);
        }

        .actions {
            display: flex;
            gap: 10px;
        }

        .btn-action {
            background: linear-gradient(135deg, var(--neon-green), #047857);
            color: #fff;
            border: none;
            padding: 8px 18px;
            border-radius: 10px;
            font-weight: 700;
            font-family: 'Tajawal', sans-serif;
            cursor: pointer;
            text-decoration: none;
            font-size: 13px;
            box-shadow: 0 4px 12px rgba(16, 185, 129, 0.3);
        }
        .btn-action:hover {
            filter: brightness(1.1);
            transform: scale(1.03);
        }

        .btn-external {
            background: linear-gradient(135deg, #6366f1, #4338ca);
            box-shadow: 0 4px 12px rgba(99, 102, 241, 0.3);
        }

        #player-container {
            display: none;
            background: var(--surface);
            border: 2px solid var(--neon-blue);
            border-radius: 20px;
            padding: 20px;
            margin-top: 40px;
            box-shadow: 0 10px 40px rgba(0, 240, 255, 0.25);
        }

        .player-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .player-title {
            color: var(--neon-blue);
            font-weight: 800;
            font-size: 18px;
            margin: 0;
        }

        video {
            width: 100%;
            max-height: 480px;
            background: #000;
            border-radius: 12px;
            outline: none;
        }

        .btn-close {
            background: var(--neon-pink);
            color: white;
            border: none;
            padding: 6px 14px;
            border-radius: 8px;
            font-weight: 700;
            cursor: pointer;
        }

        .empty-msg {
            text-align: center;
            color: var(--text-muted);
            padding: 25px;
            background: var(--surface);
            border-radius: 14px;
            border: 1px dashed var(--border);
        }
    </style>
    <!-- مكتبة تشغيل الـ m3u8 والـ ts -->
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
</head>
<body data-theme="dark">

    <script>
        let pwd = prompt("🔐 أدخل رمز الدخول للموقع:");
        if (pwd !== "2002") {
            alert("❌ رمز الدخول غير صحيح!");
            document.body.innerHTML = "<div style='text-align:center; margin-top:200px; color:#ff0055; font-family:Tajawal; font-size:22px; font-weight:bold;'>رمز الدخول غير صحيح! يرجى إعادة تحميل الصفحة.</div>";
            throw new Error("Access Denied");
        }
    </script>

    <div class="container">
        <div class="hero-header">
            <div class="logo-area">
                <h1>⚡ MCR7 ULTRA LIVE</h1>
                <div class="developer-tag">إشراف وتطوير: محمد جواد 👑</div>
            </div>
            <button class="theme-toggle" onclick="toggleTheme()">🌓 وضع الإضاءة</button>
        </div>

        <div class="section-title">⚽ جدول المباريات المباشرة</div>
        <div id="matches" class="grid-cards">
            <div class="empty-msg">جاري تحميل المباريات بأعلى جودة...</div>
        </div>

        <div class="section-title">📺 القنوات الفضائية والرياضية</div>
        <div id="channels" class="grid-cards">
            <div class="empty-msg">جاري تحميل القنوات...</div>
        </div>

        <div id="player-container">
            <div class="player-header">
                <h3 id="player-title" class="player-title">مشغل البث</h3>
                <button class="btn-close" onclick="closePlayer()">إغلاق ✕</button>
            </div>
            <video id="video-player" controls autoplay></video>
        </div>
    </div>

    <script>
        function toggleTheme() {
            const body = document.body;
            if (body.getAttribute("data-theme") === "dark") {
                body.setAttribute("data-theme", "light");
            } else {
                body.setAttribute("data-theme", "dark");
            }
        }

        function playStream(url, title) {
            const container = document.getElementById('player-container');
            const video = document.getElementById('video-player');
            const titleElem = document.getElementById('player-title');
            
            container.style.display = 'block';
            titleElem.innerText = "📺 " + title;
            window.scrollTo({top: document.body.scrollHeight, behavior: 'smooth'});

            // دعم روابط m3u8 و ts بشكل مباشر
            if (url.includes('.m3u8') || url.includes('.ts')) {
                if (Hls.isSupported()) {
                    const hls = new Hls();
                    hls.loadSource(url);
                    hls.attachMedia(video);
                    hls.on(Hls.Events.MANIFEST_PARSED, function() {
                        video.play();
                    });
                } else if (video.canPlayType('application/vnd.apple.mpegurl') || video.canPlayType('video/mp2t')) {
                    video.src = url;
                    video.addEventListener('loadedmetadata', function() {
                        video.play();
                    });
                }
            } else {
                window.open(url, '_blank');
            }
        }

        function closePlayer() {
            const video = document.getElementById('video-player');
            const container = document.getElementById('player-container');
            video.pause();
            video.src = "";
            container.style.display = 'none';
        }

        fetch('matches.json')
            .then(res => res.json())
            .then(data => {
                let output = '';
                if(!data || data.length === 0) { 
                    output = '<div class="empty-msg">لا توجد مباريات مضافة حالياً</div>'; 
                } else {
                    data.forEach(item => {
                        let link = item.link || item.url || '#';
                        let title = item.name || item.title || 'مباراة';
                        output += `
                            <div class="match-card">
                                <div class="match-info">
                                    <div class="live-pulse"></div>
                                    <span class="match-title">${title}</span>
                                </div>
                                <div class="actions">
                                    <button class="btn-action" onclick="playStream('${link}', '${title}')">مشاهدة حية</button>
                                    <a class="btn-action btn-external" href="${link}" target="_blank">رابط خارجي</a>
                                </div>
                            </div>
                        `;
                    });
                }
                document.getElementById('matches').innerHTML = output;
            }).catch(() => { document.getElementById('matches').innerHTML = '<div class="empty-msg">خطأ في تحميل المباريات</div>'; });

        fetch('channels.json')
            .then(res => res.json())
            .then(data => {
                let output = '';
                if(!data || data.length === 0) { 
                    output = '<div class="empty-msg">لا توجد قنوات مضافة حالياً</div>'; 
                } else {
                    data.forEach(item => {
                        let link = item.link || item.url || '#';
                        let title = item.name || item.title || 'قناة';
                        output += `
                            <div class="match-card">
                                <div class="match-info">
                                    <div class="live-pulse" style="background-color: var(--neon-blue);"></div>
                                    <span class="match-title">${title}</span>
                                </div>
                                <div class="actions">
                                    <button class="btn-action" onclick="playStream('${link}', '${title}')">تشغيل القناة</button>
                                    <a class="btn-action btn-external" href="${link}" target="_blank">رابط خارجي</a>
                                </div>
                            </div>
                        `;
                    });
                }
                document.getElementById('channels').innerHTML = output;
            }).catch(() => { document.getElementById('channels').innerHTML = '<div class="empty-msg">خطأ في تحميل القنوات</div>'; });
    </script>

</body>
</html>
