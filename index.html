<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MCR7 - النطاق السيبراني</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
<style>
:root { 
  --bg-dark: #020617; 
  --card-bg: rgba(15, 23, 42, 0.8); 
  --text-color: #f8fafc; 
  --neon-cyan: #00f0ff; 
  --neon-purple: #a855f7; 
  --border-glow: rgba(0, 240, 255, 0.3); 
}
* { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Tajawal', sans-serif; }
body { 
  background: radial-gradient(circle at 50% 20%, #1e1b4b 0%, var(--bg-dark) 100%); 
  color: var(--text-color); 
  min-height: 100vh; 
  overflow-x: hidden; 
}

/* شاشة تسجيل الدخول السيبرانية */
.login-screen { position: fixed; inset: 0; background: rgba(2, 6, 23, 0.95); backdrop-filter: blur(15px); display: flex; align-items: center; justify-content: center; z-index: 999; padding: 1rem; }
.login-box { background: var(--card-bg); padding: 2.5rem; border-radius: 24px; border: 1px solid var(--border-glow); text-align: center; max-width: 400px; width: 100%; box-shadow: 0 0 50px rgba(0, 240, 255, 0.15); backdrop-filter: blur(10px); }
.login-box h3 { color: var(--neon-cyan); margin-bottom: 1.5rem; font-size: 1.5rem; text-shadow: 0 0 10px rgba(0,240,255,0.5); }
input { width: 100%; padding: 14px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.1); background: rgba(2, 6, 23, 0.8); color: #fff; margin: 15px 0; text-align: center; outline: none; font-size: 1rem; transition: 0.3s; }
input:focus { border-color: var(--neon-cyan); box-shadow: 0 0 20px rgba(0, 240, 255, 0.4); }
.login-btn { width: 100%; padding: 14px; background: linear-gradient(135deg, var(--neon-cyan), var(--neon-purple)); color: #000; border: none; font-weight: 900; border-radius: 12px; cursor: pointer; font-size: 1.1rem; box-shadow: 0 0 25px rgba(0, 240, 255, 0.4); transition: 0.3s; }

/* الهيدر السيبراني مع إضاءة نيون متحركة */
header { background: rgba(15, 23, 42, 0.8); border-bottom: 1px solid rgba(255,255,255,0.05); padding: 1.2rem 2rem; display: flex; justify-content: space-between; align-items: center; backdrop-filter: blur(10px); }
.logo { font-size: 1.6rem; font-weight: 900; background: linear-gradient(45deg, var(--neon-cyan), var(--neon-purple), #ff007f, var(--neon-cyan)); background-size: 300% 300%; -webkit-background-clip: text; -webkit-text-fill-color: transparent; animation: sciFiGlow 6s ease infinite; text-shadow: 0 0 25px rgba(0,240,255,0.4); }

@keyframes sciFiGlow {
  0% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}

main { max-width: 1100px; width: 100%; margin: 0 auto; padding: 2rem 1rem; display: none; }

/* حاوية البث الخيالية */
.video-container { position: relative; width: 100%; height: 0; padding-bottom: 56.25%; background: #000; border-radius: 20px; overflow: hidden; border: 2px solid var(--border-glow); box-shadow: 0 0 40px rgba(0, 240, 255, 0.2); margin-bottom: 2rem; display: flex; align-items: center; justify-content: center; }
.video-container video, .video-container iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }

/* شاشة توجيه ذكية لروابط البروكسي المحمية */
.proxy-overlay { position: absolute; inset: 0; display: none; flex-direction: column; align-items: center; justify-content: center; background: rgba(2, 6, 23, 0.92); z-index: 20; text-align: center; padding: 2rem; }
.proxy-overlay h4 { color: var(--neon-cyan); font-size: 1.3rem; margin-bottom: 0.8rem; text-shadow: 0 0 10px rgba(0,240,255,0.4); }
.proxy-overlay p { color: #94a3b8; margin-bottom: 1.5rem; font-size: 1rem; max-width: 400px; }
.proxy-btn { padding: 14px 28px; background: linear-gradient(135deg, var(--neon-cyan), var(--neon-purple)); color: #000; font-weight: 900; border: none; border-radius: 12px; cursor: pointer; text-decoration: none; box-shadow: 0 0 20px rgba(0,240,255,0.4); transition: 0.3s; }
.proxy-btn:hover { transform: scale(1.05); box-shadow: 0 0 30px rgba(0,240,255,0.7); }

h3 { color: #94a3b8; font-weight: 700; margin-bottom: 1rem; letter-spacing: 1px; font-size: 1rem; }
.channels-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(170px, 1fr)); gap: 12px; }
.channel-btn { background: var(--card-bg); border: 1px solid rgba(255,255,255,0.08); color: var(--text-color); padding: 14px; border-radius: 14px; font-weight: bold; cursor: pointer; text-align: center; transition: 0.3s; backdrop-filter: blur(5px); }
.channel-btn:hover { border-color: var(--neon-cyan); transform: translateY(-3px); box-shadow: 0 5px 20px rgba(0, 240, 255, 0.2); }
.channel-btn.active { background: linear-gradient(135deg, var(--neon-cyan), var(--neon-purple)); color: #000; border-color: transparent; box-shadow: 0 0 25px rgba(0, 240, 255, 0.5); }
</style>
</head>
<body>

<div class="login-screen" id="loginScreen">
  <div class="login-box">
    <h3>⚡ MCR7 NEXUS ⚡</h3>
    <input type="password" id="sitePass" placeholder="رمز الدخول السري">
    <button class="login-btn" onclick="checkPass()">وصول للنظام</button>
  </div>
</div>

<header>
  <div class="logo">MCR7 LIVE 🌌</div>
</header>

<main id="mainContent">
  <div class="video-container" id="playerWrapper">
    <video id="videoPlayer" controls autoplay playsinline style="display:none;"></video>
    
    <!-- واجهة ذكية تظهر فوراً لروابط البروكسي واليوتيوب المحمية لتشغيلها بسلاسة -->
    <div class="proxy-overlay" id="proxyOverlay">
      <security-title><h4>🔒 سيرفر محمي من المصدر</h4></security-title>
      <p>هذا السيرفر يتطلب التشغيل المباشر لضمان عدم توقف البث أو ظهور شاشة سوداء.</p>
      <a id="directOpenBtn" href="#" target="_blank" class="proxy-btn">🚀 اضغط هنا لفتح البث فوراً</a>
    </div>
  </div>
  
  <h3>📺 قنوات البث النشطة:</h3>
  <div class="channels-grid" id="channelsList"></div>
</main>

<script>
const DEFAULT_PASS = "1234";
let hls = null;

function checkPass() {
  const entered = document.getElementById('sitePass').value;
  const savedPass = localStorage.getItem('mcr7_site_pass') || DEFAULT_PASS;
  if(entered === savedPass) {
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('mainContent').style.display = 'block';
    loadChannels();
  } else {
    alert('رمز الدخول غير صحيح!');
  }
}

async function loadChannels() {
  let channels = [];
  try {
    const res = await fetch('https://rrrr123kl-rgb.github.io/MCR7/channels.json?t=' + Date.now());
    if(res.ok) channels = await res.json();
  } catch(e) {}

  if(!channels || channels.length === 0) {
    channels = JSON.parse(localStorage.getItem('app_channels')) || [];
  }

  renderButtons(channels);
}

function renderButtons(channels) {
  const container = document.getElementById('channelsList');
  container.innerHTML = '';

  channels.forEach((ch, index) => {
    const btn = document.createElement('button');
    btn.className = 'channel-btn' + (index === 0 ? ' active' : '');
    btn.textContent = ch.name;
    btn.onclick = () => playStream(ch.url, btn);
    container.appendChild(btn);
  });

  if(channels.length > 0) playStream(channels[0].url, container.firstChild);
}

function playStream(url, btnElement) {
  if(btnElement) {
    document.querySelectorAll('.channel-btn').forEach(b => b.classList.remove('active'));
    btnElement.classList.add('active');
  }

  const wrapper = document.getElementById('playerWrapper');
  const video = document.getElementById('videoPlayer');
  const proxyOverlay = document.getElementById('proxyOverlay');

  // إيقاف وتفريغ تام للبث السابق فوراً وبدون رفرش
  video.pause();
  video.src = "";
  video.style.display = 'none';
  proxyOverlay.style.display = 'none';
  
  const oldIframe = wrapper.querySelector('iframe');
  if(oldIframe) oldIframe.remove();

  if (hls) {
    hls.destroy();
    hls = null;
  }

  // فحص نوع الرابط بدقة متناهية
  if (url.includes('.m3u8') || url.includes('.ts')) {
    // روابط البث المباشر الخام تشتغل داخل المشغل فوراً
    video.style.display = 'block';
    if (Hls.isSupported()) {
      hls = new Hls();
      hls.loadSource(url);
      hls.attachMedia(video);
      hls.on(Hls.Events.MANIFEST_PARSED, function() {
        video.play().catch(e => console.log("Autoplay blocked"));
      });
    } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
      video.src = url;
      video.play().catch(e => console.log("Autoplay blocked"));
    }
  } else {
    // الروابط المحمية أو روابط البروكسي (مثل العبودي) تظهر زر الخيال العلمي الأنيق للتشغيل الفوري المضمون
    proxyOverlay.style.display = 'flex';
    document.getElementById('directOpenBtn').href = url;
  }
}
</script>
</body>
</html>
